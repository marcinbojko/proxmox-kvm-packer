initial_packages:
  - curl
  - mc
  - wget
  - yum-cron
  - yum-plugin-priorities
  - yum-plugin-versionlock
  - yum-utils
  - deltarpm
  - ca-certificates
yum_extra_groups:
  - "@base"
  - "@compat-libraries"
  - "@core"
  - "@guest-agents"
  - "@input-methods"
  - "@network-file-system-client"
  - "@performance"
yum_extra_packages:
  - gcc
  - hdparm
  - iotop
  - make
  - nmap
  - dkms
  - ntp
  - ntpdate
  - parted
  - patch
  - screen
  - smartmontools
  - telnet
  - tmux
  - xauth
  - zsh
yum_extra_epel_packages:
  - atop
  - bmon
  - htop
  - httpie
  - iftop
  - jq
  - multitail
  - ncdu
  - nmon
  - pv
  - rkhunter
epel_package:
  - epel-release
selinux:
  state: disabled
fastfetch:
  package:
    name: fastfetch
timezone: "UTC"
firewalld:
  default_zone: work
  rich_rules:
    - rule: 'rule family="ipv4" source address="0.0.0.0/0" port port="22" protocol="tcp" accept'
  cockpit_rich_rules:
    - rule: 'rule family="ipv4" source address="0.0.0.0/0" port port="9090" protocol="tcp" accept'
  services_remove:
    - ssh
services:
  - name: firewalld
    state: started
    enabled: true
  - name: ntpd
    state: started
    enabled: true
  - name: sshd
    state: started
    enabled: true
  - name: initial-setup-text
    enabled: false
    state: stopped
  - name: initial-setup-graphical
    enabled: false
    state: stopped
sysctl:
  - key: net.ipv4.ip_forward
    value: 1
    state: present
tuned_profile: throughput-performance
locale:
  language: "en_US.utf8"
  keymap: "us"
hyperv:
  - name: hypervfcopyd
  - name: hypervkvpd
  - name: hypervvssd
motd: |
  #!/bin/bash
  fastfetch --config /etc/fastfetch.jsonc
  if [ -f ~/.Xauthority ]; then
    xauth merge ~/.Xauthority
  fi
  export XAUTHORITY=$HOME/.Xauthority
  export PATH="/usr/local/bin:$PATH"
kernel_parameters:
  - key: "fsck.repair"
    value: "yes"
    state: present
  - key: "systemd.unified_cgroup_hierarchy"
    value: "1"
    state: present
