initial_packages:
  - almalinux-release
  - curl
  - mc
  - wget
  - tar
  - bzip2
  - kernel-devel
  - kernel-headers
  - perl
  - gcc
  - make
  - elfutils-libelf-devel
  - langpacks-en
  - glibc-all-langpacks
  - ca-certificates
  - yum-utils
yum_extra_groups:
  - "@base"
  - "@core"
yum_extra_packages:
  - gcc
  - hdparm
  - iotop
  - make
  - nmap
  - chrony
  - dkms
  - parted
  - patch
  - screen
  - smartmontools
  - telnet
  - tmux
  - xauth
  - zsh
  - tuned
  - tuned-profiles-atomic
yum_extra_epel_packages:
  #- atop
  - bmon
  - htop
  - iftop
  - jq
  - ncdu
  # - nmon
  - pv
  # - rkhunter
epel_package:
  - epel-release
selinux:
  state: disabled
fastfetch:
  package:
    name: fastfetch
timezone: "UTC"
firewalld:
  default_zone: work
  rich_rules:
    - rule: 'rule family="ipv4" source address="0.0.0.0/0" port port="22" protocol="tcp" accept'
  cockpit_rich_rules:
    - rule: 'rule family="ipv4" source address="0.0.0.0/0" port port="9090" protocol="tcp" accept'
  services_remove:
    - ssh
services:
  - name: firewalld
    state: started
    enabled: true
  - name: chronyd
    state: started
    enabled: true
  - name: sshd
    state: started
    enabled: true
sysctl:
  - key: net.ipv4.ip_forward
    value: 1
    state: present
tuned_profile: virtual-guest
locale:
  language: en_US.utf8
  keymap: us
hyperv:
  - name: hypervfcopyd
  - name: hypervkvpd
  - name: hypervvssd
motd: |
  #!/bin/bash
  if command -v fastfetch >/dev/null 2>&1; then
    fastfetch --config /etc/fastfetch.jsonc
  fi
  if [ -f ~/.Xauthority ]; then
    xauth merge ~/.Xauthority
  fi
  export XAUTHORITY=$HOME/.Xauthority
  export PATH="/usr/local/bin:$PATH"
kernel_parameters:
  - key: "fsck.repair"
    value: "yes"
    state: present
