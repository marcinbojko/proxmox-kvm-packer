# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian12
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Copenhagen

# Partitioning - GPT with EFI partition for UEFI boot
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Root account - no regular user
d-i passwd/root-login boolean true
d-i passwd/root-password password password
d-i passwd/root-password-again password password
d-i passwd/make-user boolean false

# Apt
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

# Packages - only packages guaranteed on DVD-1; extras installed via late_command
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server sudo python3 python3-apt

# No popularity contest
popularity-contest popularity-contest/participate boolean false

# GRUB - EFI mode, no bootdev needed
d-i grub-installer/only_debian boolean true

# Finish
d-i finish-install/reboot_in_progress note

# Late commands: install extra packages from network mirror, configure SSH and services
d-i preseed/late_command string \
  rm -f /target/etc/apt/sources.list.d/*; \
  echo "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware" > /target/etc/apt/sources.list; \
  echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" >> /target/etc/apt/sources.list; \
  echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware" >> /target/etc/apt/sources.list; \
  in-target apt-get update -qq; \
  in-target env DEBIAN_FRONTEND=noninteractive apt-get -y -o Dpkg::Options::="--force-confold" dist-upgrade; \
  in-target env DEBIAN_FRONTEND=noninteractive apt-get install -y qemu-guest-agent cloud-init curl wget mc vim htop lsof rsync git gcc make perl linux-headers-amd64 tar bzip2 unzip zip net-tools dnsutils iputils-ping traceroute tcpdump ca-certificates gnupg parted lvm2 less; \
  in-target sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
  in-target sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config; \
  in-target sed -i 's/^#\?AllowAgentForwarding.*/AllowAgentForwarding yes/' /etc/ssh/sshd_config; \
  in-target systemctl enable qemu-guest-agent || true; \
  in-target systemctl enable cloud-init || true; \
  in-target systemctl enable cloud-init-local || true; \
  in-target systemctl enable cloud-config || true; \
  in-target systemctl enable cloud-final || true
